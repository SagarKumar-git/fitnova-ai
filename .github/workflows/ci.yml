# =============================================================================
# FitNova AI — GitHub Actions CI / CD Safety Gate
# =============================================================================
# Triggered on:
#   - Every push to `main`
#   - Every pull request targeting `main`
#
# Jobs:
#   backend-safety  — dep check + pip install + all tests
#   frontend-build  — npm ci + tsc + vite build
#
# Both jobs must pass before a merge is allowed (enforce via GitHub branch
# protection rules: Settings → Branches → Require status checks to pass).
# =============================================================================

name: CI — Deployment Safety Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Backend Safety Checks
  # ---------------------------------------------------------------------------
  backend-safety:
    name: Backend — Dep Check + Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Dependency Coverage Check ────────────────────────────────────────
      - name: Check — All imports declared in requirements.txt
        run: python check_deps.py --root app --requirements requirements.txt

      # ── 5. API Integration Tests ─────────────────────────────────────────────
      - name: Test — API integration (test_api.py)
        env:
          DATABASE_URL: "sqlite:///./test_fitnova.db"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
        run: python test_api.py

      # ── 6. Workout Integration Tests ─────────────────────────────────────────
      - name: Test — Workout integration (test_workouts.py)
        env:
          DATABASE_URL: "sqlite:///./test_workouts.db"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
        run: python test_workouts.py

  # ---------------------------------------------------------------------------
  # Job 2: Frontend Build Check
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend — TypeScript + Vite Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ───────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install Node dependencies ─────────────────────────────────────────
      - name: Install Node dependencies
        run: npm ci

      # ── 4. TypeScript type check + Vite build ────────────────────────────────
      - name: Build — tsc + vite build
        run: npm run build
